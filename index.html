<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena Decks</title>
  <style>
    :root {
      --bg: #0d0f18;
      --surface: #161928;
      --surface2: #1e2235;
      --border: #2a2f4a;
      --text: #e8eaf2;
      --text-muted: #7b82a0;
      --accent: #6c8ef5;
      --accent-dim: rgba(108,142,245,0.12);
      --danger: #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Import page ── */
    #importPage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6c8ef5 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .import-box {
      width: 100%;
      max-width: 600px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
    }

    .import-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
      display: block;
    }

    textarea {
      width: 100%;
      height: 280px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 0.9rem 1rem;
      resize: vertical;
      transition: border-color 0.15s;
    }

    textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
    textarea:focus { outline: none; border-color: var(--accent); }

    .import-error {
      font-size: 0.82rem;
      color: var(--danger);
      min-height: 1.2rem;
      margin-top: 0.5rem;
    }

    .btn-import {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-import:hover { opacity: 0.9; }
    .btn-import:active { transform: scale(0.99); }

    /* ── Deck page ── */
    #deckPage { display: none; }

    .deck-wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 3rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .top-bar-left .logo-sm {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6c8ef5, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .deck-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .btn-new {
      padding: 0.45rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 0.83rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn-new:hover { border-color: var(--accent); color: var(--accent); }

    .share-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .share-icon {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .share-url {
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: all;
    }

    .btn-copy {
      padding: 0.35rem 0.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: #4ade80; color: #4ade80; }

    .controls-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.6rem 0.9rem 0.6rem 2.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.88rem;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }

    .pills {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .pill {
      padding: 0.38rem 0.85rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Loading ── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Card sections ── */
    .no-results {
      display: none;
      padding: 3rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .section { margin-bottom: 2rem; }

    .section-heading {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .section-name {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-item {
      position: relative;
      cursor: pointer;
      border-radius: 7px;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .card-item:hover {
      transform: translateY(-5px) scale(1.02);
      z-index: 2;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }

    .card-item img {
      display: block;
      width: 115px;
      border-radius: 7px;
      background: var(--surface2);
    }

    .card-item img.loading-img {
      /* placeholder aspect ratio while loading */
      aspect-ratio: 63/88;
    }

    .card-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: rgba(0,0,0,0.82);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 1px 6px;
      border-radius: 10px;
      line-height: 1.5;
      pointer-events: none;
    }

    .card-item.hidden { display: none; }

    /* ── Modal ── */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    #modal.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-inner {
      position: relative;
      max-width: 440px;
      width: 100%;
    }

    #modalImg {
      display: block;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
    }

    .modal-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 32px;
      height: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }

    .modal-close:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .card-item img { width: 90px; }
      .deck-wrap { padding: 1rem 0.75rem 2rem; }
    }
  </style>
</head>
<body>

<!-- ════════════════════ IMPORT PAGE ════════════════════ -->
<div id="importPage">
  <div class="logo">Arena Decks</div>
  <p class="tagline">Paste your Magic: The Gathering Arena export and get a shareable link.</p>
  <div class="import-box">
    <label class="import-label" for="deckInput">Arena Export</label>
    <textarea
      id="deckInput"
      placeholder="Companion&#10;1 Yorion, Sky Nomad (IKO) 232&#10;&#10;Deck&#10;4 Absorb (RNA) 151&#10;4 Hallowed Fountain (RNA) 251&#10;...&#10;&#10;Sideboard&#10;2 Negate (STA) 18"
      spellcheck="false"
      autocorrect="off"
    ></textarea>
    <div class="import-error" id="importError"></div>
    <button class="btn-import" onclick="importDeck()">Import Deck</button>
  </div>
</div>

<!-- ════════════════════ DECK PAGE ════════════════════ -->
<div id="deckPage">
  <div class="deck-wrap">

    <div class="top-bar">
      <div class="top-bar-left">
        <a class="logo-sm" href="#" onclick="showImport(event)">Arena Decks</a>
        <div class="deck-meta" id="deckMeta"></div>
      </div>
      <a class="btn-new" href="#" onclick="showImport(event)">+ Import another deck</a>
    </div>

    <div class="share-row">
      <svg class="share-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      <div class="share-url" id="shareUrl"></div>
      <button class="btn-copy" id="copyBtn" onclick="copyUrl()">Copy Link</button>
    </div>

    <div class="controls-row">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Filter by name or type..."
          oninput="filterCards()"
          autocomplete="off"
        >
      </div>
      <div class="pills" id="filterPills">
        <button class="pill active" data-filter="all"         onclick="setFilter(this)">All</button>
        <button class="pill"        data-filter="creature"    onclick="setFilter(this)">Creatures</button>
        <button class="pill"        data-filter="planeswalker" onclick="setFilter(this)">Planeswalkers</button>
        <button class="pill"        data-filter="spell"       onclick="setFilter(this)">Spells</button>
        <button class="pill"        data-filter="land"        onclick="setFilter(this)">Lands</button>
        <button class="pill"        data-filter="sideboard"   onclick="setFilter(this)">Sideboard</button>
      </div>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div>Fetching card data from Scryfall…</div>
    </div>

    <div class="no-results" id="noResults">No cards match your filter.</div>
    <div id="cardSections" style="display:none"></div>

  </div>
</div>

<!-- ════════════════════ MODAL ════════════════════ -->
<div id="modal" onclick="handleModalClick(event)">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img id="modalImg" src="" alt="">
  </div>
</div>

<script>
'use strict';

// ── URL encoding (URL-safe base64) ─────────────────────────────────────────

function encode(text) {
  const bytes = new TextEncoder().encode(text);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function decode(str) {
  const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

// ── Arena decklist parser ──────────────────────────────────────────────────

function parseDecklist(raw) {
  const out = { companion: [], deck: [], sideboard: [] };
  let section = 'deck';

  for (const line of raw.split('\n')) {
    const t = line.trim();
    if (!t) continue;
    const low = t.toLowerCase();
    if (low === 'companion') { section = 'companion'; continue; }
    if (low === 'deck')      { section = 'deck';      continue; }
    if (low === 'sideboard') { section = 'sideboard'; continue; }

    // e.g. "4 Absorb (RNA) 151"
    const m = t.match(/^(\d+)\s+(.+?)\s+\((\w+)\)\s+(\w+)$/);
    if (m) {
      out[section].push({
        count:  parseInt(m[1], 10),
        name:   m[2],
        set:    m[3].toLowerCase(),
        number: m[4],
      });
    }
  }
  return out;
}

// ── Scryfall batch fetch ───────────────────────────────────────────────────

async function fetchCards(cards) {
  // Deduplicate by set+number
  const seen  = new Set();
  const ids   = [];
  for (const c of cards) {
    const k = `${c.set}/${c.number}`;
    if (!seen.has(k)) { seen.add(k); ids.push({ set: c.set, collector_number: c.number }); }
  }

  const map = {};
  for (let i = 0; i < ids.length; i += 75) {
    // Scryfall asks for a polite delay between requests
    if (i > 0) await new Promise(r => setTimeout(r, 100));
    const res  = await fetch('https://api.scryfall.com/cards/collection', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ identifiers: ids.slice(i, i + 75) }),
    });
    const json = await res.json();
    for (const card of (json.data || [])) {
      map[`${card.set}/${card.collector_number}`] = card;
    }
  }
  return map;
}

function imageUris(card) {
  return card?.image_uris ?? card?.card_faces?.[0]?.image_uris ?? null;
}

function cardType(card) {
  if (!card) return 'spell';
  const t = (card.type_line || '').toLowerCase();
  if (t.includes('creature'))    return 'creature';
  if (t.includes('planeswalker')) return 'planeswalker';
  if (t.includes('land'))        return 'land';
  return 'spell';
}

// ── Render ────────────────────────────────────────────────────────────────

const TYPE_ORDER  = ['creature', 'planeswalker', 'spell', 'land'];
const TYPE_LABELS = { creature: 'Creatures', planeswalker: 'Planeswalkers', spell: 'Spells', land: 'Lands' };

function makeCardEl(entry, cardMap, sectionKey) {
  const mapKey = `${entry.set}/${entry.number}`;
  const lookup = cardMap[mapKey];
  const uris   = imageUris(lookup);

  if (!lookup) {
    console.warn(`[arena-decks] Card not found in Scryfall response:`, { name: entry.name, set: entry.set, number: entry.number, mapKey });
  } else if (!uris) {
    console.warn(`[arena-decks] Card found but has no image_uris:`, { name: lookup.name, layout: lookup.layout, card_faces: lookup.card_faces });
  } else if (!uris.small) {
    console.warn(`[arena-decks] Card has image_uris but no 'small':`, { name: lookup.name, uris });
  }

  const el = document.createElement('div');
  el.className = 'card-item';
  el.dataset.name    = (lookup?.name ?? entry.name).toLowerCase();
  el.dataset.type    = cardType(lookup);
  el.dataset.section = sectionKey;
  el.dataset.typeLine = (lookup?.type_line ?? '').toLowerCase();

  const img = document.createElement('img');
  img.alt     = lookup?.name ?? entry.name;
  img.title   = lookup?.name ?? entry.name;
  img.loading = 'lazy';
  img.className = 'loading-img';

  if (uris?.small) {
    img.src = uris.small;
    img.onload = () => img.classList.remove('loading-img');
    img.onerror = () => {
      console.error(`[arena-decks] Image failed to load for "${lookup?.name ?? entry.name}":`, uris.small);
      img.style.background = 'var(--surface2)';
      img.style.minHeight  = '161px';
    };
  } else {
    img.style.background = 'var(--surface2)';
    img.style.minHeight  = '161px';
  }

  if (entry.count > 1) {
    const badge = document.createElement('div');
    badge.className   = 'card-badge';
    badge.textContent = `×${entry.count}`;
    el.appendChild(badge);
  }

  el.appendChild(img);

  const largeUrl = uris?.large ?? uris?.normal ?? uris?.small ?? '';
  el.addEventListener('click', () => largeUrl && openModal(largeUrl));

  return el;
}

function renderDeck(sections, cardMap) {
  const container = document.getElementById('cardSections');
  container.innerHTML = '';

  const groups = [];

  // Companion
  if (sections.companion.length) {
    const n = sections.companion.reduce((s, c) => s + c.count, 0);
    groups.push({ label: `Companion (${n})`, cards: sections.companion, key: 'companion' });
  }

  // Main deck — split by type
  const byType = { creature: [], planeswalker: [], spell: [], land: [] };
  for (const c of sections.deck) {
    byType[cardType(cardMap[`${c.set}/${c.number}`])].push(c);
  }
  for (const type of TYPE_ORDER) {
    if (!byType[type].length) continue;
    const n = byType[type].reduce((s, c) => s + c.count, 0);
    groups.push({ label: `${TYPE_LABELS[type]} (${n})`, cards: byType[type], key: type });
  }

  // Sideboard
  if (sections.sideboard.length) {
    const n = sections.sideboard.reduce((s, c) => s + c.count, 0);
    groups.push({ label: `Sideboard (${n})`, cards: sections.sideboard, key: 'sideboard' });
  }

  for (const g of groups) {
    const section  = document.createElement('div');
    section.className = 'section';

    const heading  = document.createElement('div');
    heading.className = 'section-heading';
    heading.innerHTML = `<span class="section-name">${g.label}</span>`;
    section.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    for (const entry of g.cards) grid.appendChild(makeCardEl(entry, cardMap, g.key));
    section.appendChild(grid);

    container.appendChild(section);
  }

  document.getElementById('loadingState').style.display = 'none';
  container.style.display = 'block';
  applyFilters();
}

// ── Filtering ─────────────────────────────────────────────────────────────

let activeFilter = 'all';

function filterCards() { applyFilters(); }

function setFilter(btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('searchInput')?.value ?? '').toLowerCase().trim();

  let anyVisible = false;
  document.querySelectorAll('.card-item').forEach(item => {
    const matchSearch = !q
      || item.dataset.name.includes(q)
      || item.dataset.typeLine.includes(q);

    const matchFilter = activeFilter === 'all'
      || item.dataset.section === activeFilter
      || item.dataset.type    === activeFilter;

    const visible = matchSearch && matchFilter;
    item.classList.toggle('hidden', !visible);
    if (visible) anyVisible = true;
  });

  // Hide sections that are entirely empty
  document.querySelectorAll('.section').forEach(sec => {
    sec.style.display = sec.querySelectorAll('.card-item:not(.hidden)').length ? '' : 'none';
  });

  const noRes = document.getElementById('noResults');
  if (noRes) noRes.style.display = anyVisible ? 'none' : 'block';
}

// ── Modal ─────────────────────────────────────────────────────────────────

function openModal(url) {
  document.getElementById('modalImg').src = url;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalImg').src = '';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Import & load ─────────────────────────────────────────────────────────

function importDeck() {
  const raw     = document.getElementById('deckInput').value.trim();
  const errEl   = document.getElementById('importError');

  errEl.textContent = '';

  if (!raw) {
    errEl.textContent = 'Please paste an Arena decklist first.';
    return;
  }

  const sections = parseDecklist(raw);
  const total    = sections.deck.reduce((s, c) => s + c.count, 0);

  if (total === 0) {
    errEl.textContent = 'No cards found — make sure to paste a valid Arena export.';
    return;
  }

  const encoded = encode(raw);
  const url     = `${location.origin}${location.pathname}?d=${encoded}`;
  history.pushState(null, '', `?d=${encoded}`);
  showDeckPage(raw, url);
}

async function showDeckPage(raw, url) {
  document.getElementById('importPage').style.display = 'none';
  document.getElementById('deckPage').style.display   = 'block';
  document.getElementById('loadingState').style.display  = 'flex';
  document.getElementById('cardSections').style.display  = 'none';
  document.getElementById('noResults').style.display     = 'none';

  // Reset controls
  document.getElementById('searchInput').value = '';
  activeFilter = 'all';
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.filter === 'all'));

  const sections = parseDecklist(raw);
  const main     = sections.deck.reduce((s, c) => s + c.count, 0);
  const side     = sections.sideboard.reduce((s, c) => s + c.count, 0);
  const comp     = sections.companion.length ? ' · companion' : '';

  document.getElementById('deckMeta').textContent =
    `${main} cards${comp}${side ? ` · ${side} sideboard` : ''}`;

  document.getElementById('shareUrl').textContent = url || location.href;

  try {
    const all     = [...sections.companion, ...sections.deck, ...sections.sideboard];
    const cardMap = await fetchCards(all);
    renderDeck(sections, cardMap);
  } catch (err) {
    document.getElementById('loadingState').innerHTML =
      `<div style="color:var(--danger)">Failed to load card data — please try again.</div>`;
  }
}

function copyUrl() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy Link';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function showImport(e) {
  e.preventDefault();
  history.pushState(null, '', location.pathname);
  document.getElementById('deckPage').style.display   = 'none';
  document.getElementById('importPage').style.display = 'flex';
}

// ── Boot ──────────────────────────────────────────────────────────────────

(function init() {
  const params  = new URLSearchParams(location.search);
  const encoded = params.get('d');
  if (encoded) {
    try {
      const raw = decode(encoded);
      showDeckPage(raw, location.href);
    } catch {
      // bad URL param — just show import page
    }
  }
})();
</script>
</body>
</html>
